name: Docker Image CI/CD

on:
  push:
    branches: [main]
    paths: ["versions.json", "templates"]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  generate-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Generate build matrix
        run: uv run pdev ci-matrix
        id: set-matrix

  build:
    name: Build python ${{ matrix.key }}
    runs-on: ubuntu-latest
    if: needs.generate-matrix.outputs.matrix != ''
    needs: [generate-matrix]
    strategy:
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Generate Dockerfile from config
        run: uv run pdev render-dockerfile '${{ toJSON(matrix) }}'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/${{ matrix.key }}.Dockerfile
          load: true
          tags: dkshs/python_dev:${{ matrix.key }}
      - name: Run smoke tests
        run: |
          docker run --rm dkshs/python_dev:${{ matrix.key }} sh -c "python --version && pip --version && uv --version"
      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/${{ matrix.key }}.Dockerfile
          platforms: ${{ join(matrix.platforms) }}
          push: true
          tags: dkshs/python_dev:${{ matrix.key }}

  update-readme:
    name: Update README tags table
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Update README.md
        run: uv run pdev update-readme
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "Nicolas Contiero"
          git config user.email "git@ncontiero.com"
          git commit -am "docs: update readme tags table"
          git push
      - name: Update Docker Hub Description
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: dkshs/python_dev
